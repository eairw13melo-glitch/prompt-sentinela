<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinela PRO</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <h1>📖 Sentinela PRO</h1>
    <p style="text-align:center; color:#555; margin-bottom:20px;">
      Ferramenta para extrair prompts do <strong>Estudo da Sentinela</strong> (jw.org)
    </p>

    <div class="input-area">
      <input type="text" id="link" placeholder="Cole o link completo do estudo (jw.org)">
    </div>

    <div class="buttons">
      <button onclick="buscar()">🚀 Buscar Estudo</button>
      <button onclick="copiar()">📋 Copiar Prompt</button>
    </div>

    <div class="resultado-area">
      <pre id="resultado"></pre>
    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
