<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sentinela PRO</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <h1>📖 Sentinela PRO</h1>

    <div class="input-area">
      <input type="text" id="link" placeholder="Cole o link do estudo">
    </div>

    <div class="buttons">
      <button onclick="buscar()">🚀 Buscar Estudo</button>
      <button onclick="copiar()">📋 Copiar Prompt</button>
    </div>

    <div class="resultado-area">
      <pre id="resultado"></pre>
    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
